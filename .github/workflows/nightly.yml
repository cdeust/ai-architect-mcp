name: AI Architect — Nightly Pipeline

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install AI Architect
        run: pip install -e mcp/

      - name: Run Nightly Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_ARCHITECT_REPO: ${{ github.repository }}
        run: python scripts/ci/entrypoint.py --trigger nightly

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-output-${{ github.run_number }}
          path: .ai-architect/
          retention-days: 14
