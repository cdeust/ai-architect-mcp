name: AI Architect — Issue-Triggered Pipeline

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-pipeline:
    if: contains(github.event.issue.labels.*.name, 'ai-architect')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install AI Architect
        run: pip install -e mcp/

      - name: Run Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_ARCHITECT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          AI_ARCHITECT_REPO: ${{ github.repository }}
        run: python scripts/ci/entrypoint.py --trigger issue

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.event.issue.number }}
          path: .ai-architect/
          retention-days: 30
