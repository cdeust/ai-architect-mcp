name: AI Architect — PR Comment Trigger

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  run-pipeline:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/ai-architect')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.issue.pull_request.head.ref || github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install AI Architect
        run: pip install -e mcp/

      - name: Run Pipeline on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_ARCHITECT_PR_NUMBER: ${{ github.event.issue.number }}
          AI_ARCHITECT_REPO: ${{ github.repository }}
          AI_ARCHITECT_COMMENT: ${{ github.event.comment.body }}
        run: python scripts/ci/entrypoint.py --trigger pr-comment

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-output-${{ github.event.issue.number }}
          path: .ai-architect/
          retention-days: 30
