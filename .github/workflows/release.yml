name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full clone so test_git_diff can resolve `main...HEAD`
          fetch-depth: 0

      - name: Create local main ref
        # When CI checks out the v* tag we are in detached HEAD; only
        # origin/main exists, not a local `main` branch. test_git_diff
        # asks for `git diff main...HEAD`, which needs a local ref.
        run: git branch -f main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ai-architect (mcp) with dev extras
        working-directory: mcp
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  build-mcp:
    name: Build ai-automated-pipeline
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        working-directory: mcp
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-mcp
          path: mcp/dist/

  build-codebase-intel:
    name: Build ai-codebase-intelligence
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        working-directory: ai-codebase-intelligence
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-codebase-intel
          path: ai-codebase-intelligence/dist/

  publish-mcp:
    name: Publish ai-automated-pipeline to PyPI
    needs: build-mcp
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ai-automated-pipeline
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-mcp
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  publish-codebase-intel:
    name: Publish ai-codebase-intelligence to PyPI
    needs: build-codebase-intel
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ai-automated-codebase-intelligence
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-codebase-intel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  github-release:
    name: GitHub Release
    needs: [build-mcp, build-codebase-intel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download mcp artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-mcp
          path: dist/

      - name: Download codebase-intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-codebase-intel
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "$CHANGELOG" > changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.txt
          files: dist/*
          generate_release_notes: true
