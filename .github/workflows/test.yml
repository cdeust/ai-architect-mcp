name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit tests (ai-codebase-intelligence)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install pytest and runtime deps
        working-directory: ai-codebase-intelligence
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f pyproject.toml ]; then
            pip install -e .
          fi

      - name: Run unit tests
        working-directory: ai-codebase-intelligence
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/unit/ -q --tb=short

      - name: Enforce 300-line file limit
        working-directory: ai-codebase-intelligence
        run: |
          violations=$(find src -name "*.py" -exec sh -c 'lines=$(wc -l < "$1"); if [ "$lines" -gt 300 ]; then echo "$lines $1"; fi' _ {} \;)
          if [ -n "$violations" ]; then
            echo "Files exceeding 300-line limit:"
            echo "$violations"
            # Pre-existing violations are tracked separately; new code must not regress
            new_count=$(echo "$violations" | grep -v "csv_generator.py" | wc -l)
            if [ "$new_count" -gt 0 ]; then
              echo "::error::New file(s) exceed 300-line limit"
              exit 1
            fi
            echo "::warning::Only pre-existing csv_generator.py over limit"
          fi
